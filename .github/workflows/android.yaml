name: Build Android APK (FULL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout project
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java setup (required for Android)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Install base tools
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl

      # 4. Setup Android SDK (correct structure)
      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          cd $HOME
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip commandlinetools-linux-*.zip -d $ANDROID_SDK_ROOT/cmdline-tools

          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      # 5. Verify sdkmanager
      - name: Verify SDK Manager
        run: sdkmanager --version

      # 6. Accept licenses (IMPORTANT FIX)
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # 7. Install SDK packages (stable version)
      - name: Install SDK packages
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # 8. Grant permission to gradle
      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # 9. Clean project
      - name: Clean project
        run: ./gradlew clean

      # 10. Build APK
      - name: Build APK
        run: ./gradlew assembleDebug

      # 11. Upload APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk