name: Build Kivy APK (FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # System dependencies
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            build-essential \
            libffi-dev libssl-dev \
            autoconf automake libtool pkg-config \
            cmake zlib1g-dev

      # Install Buildozer
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Build APK (IMPORTANT: NO init, NO gradlew, NO SDK)
      - name: Build APK
        run: |
          buildozer -v android debug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk